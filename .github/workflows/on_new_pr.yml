--- # Pull Request
# Maintain in repo: cs-template
name: Pull Request
on:
  # https://securitylab.github.com/research/github-actions-preventing-pwn-requests
  # could and should work, at least for public repos;
  # tracking issue for this action's issue:
  # https://github.com/ahmadnassri/action-dependabot-auto-merge/issues/60
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    # Specifically check that dependabot (or another trusted party) created this pull-request, and that it has been labelled correctly.
    if: contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Checkout Source"
        uses: actions/checkout@v6.0.3
        with:
          clean: true
          fetch-depth: 1
          ref: ${{github.event.pull_request.base.sha}}

      - name: "Auto Merge"
        uses: ./.github/actions/enable-automerge
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          merge-method: "MERGE"

  auto_approve_dependabot:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    if: contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Checkout Source"
        uses: actions/checkout@v6.0.3
        with:
          clean: true
          fetch-depth: 1
          ref: ${{github.event.pull_request.base.sha}}

      - name: "Auto Approve"
        uses: ./.github/actions/approve-pr
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
