--- # Keeps PR descriptions in sync with the PR template and auto-generates the
# Description section via GitHub Copilot. Also ticks CI/change-type checkboxes.
name: Maintain PR Description

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - converted_to_draft
      - ready_for_review
  check_run:
    types:
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  apply-template-and-description:
    name: "Apply Template and Generate Description"
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' ||
       github.event.action == 'edited' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'reopened' ||
       github.event.action == 'converted_to_draft' ||
       github.event.action == 'ready_for_review') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      models: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        with:
          clean: true
          fetch-depth: 1

      - name: "Generate description from diff"
        id: describe
        uses: ./.github/actions/generate-pr-description
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha:  ${{ github.event.pull_request.head.sha }}
          github_token: ${{ github.token }}

      - name: "Apply template and insert description"
        uses: actions/github-script@v7
        env:
          GENERATED_DESCRIPTION: ${{ steps.describe.outputs.description }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          github-token: ${{ github.token }}
          script: |
            const AUTO_MARKER       = '<!-- description-auto-generated-by-copilot -->';
            const MAINTAINED_MARKER = '<!-- maintained-by-copilot -->';
            const PULL_NUMBER       = context.payload.pull_request.number;
            const generated         = (process.env.GENERATED_DESCRIPTION || '').trim();

            // Fetch current PR body (event payload may be stale)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: PULL_NUMBER,
            });

            // Fetch template via API
            let template;
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path:  '.github/PULL_REQUEST_TEMPLATE.md',
              });
              template = Buffer.from(file.content, 'base64').toString('utf8').trimEnd();
            } catch {
              console.log('No PULL_REQUEST_TEMPLATE.md found — skipping.');
              return;
            }

            let body = pr.body ?? '';
            const normalize = (s) => s.trim().replace(/\r\n/g, '\n');
            const bodyStripped = body
              .replace(MAINTAINED_MARKER, '')
              .replace(AUTO_MARKER, '')
              .trim();

            // Apply template when the body is empty or still the bare template
            if (bodyStripped === '' || normalize(bodyStripped) === normalize(template)) {
              body = `${template}\n\n${MAINTAINED_MARKER}`;
            }

            if (!body.includes(MAINTAINED_MARKER)) {
              console.log('PR body is not managed by this workflow — skipping.');
              return;
            }

            if (!generated) {
              // Still persist a template-only body if we just applied it above
              if (!pr.body || normalize(pr.body) !== normalize(body)) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: PULL_NUMBER,
                  body,
                });
              }
              console.log('No description generated — leaving Description section as-is.');
              return;
            }

            // Skip if a human already wrote a description (no auto-marker, has real content)
            const descMatch = body.match(/^#{1,3}\s+Description\s*\n([\s\S]*?)(?=\n#{1,3}\s|$)/m);
            const descContent = descMatch ? descMatch[1] : null;
            const hasManualDesc =
              descContent &&
              !body.includes(AUTO_MARKER) &&
              descContent.replace(/<!--[\s\S]*?-->/g, '').trim().length > 0;

            if (hasManualDesc) {
              console.log('PR has a manually-written description — skipping generation.');
              return;
            }

            // Insert generated description into the Description section
            let updated = body
              .replace(`\n${AUTO_MARKER}`, '')
              .replace(AUTO_MARKER, '');

            const sectionRe = /(^#{1,3}\s+Description\s*\n)([\s\S]*?)(?=\n#{1,3}\s|$)/m;
            const match = updated.match(sectionRe);
            if (match) {
              updated = updated.replace(
                match[0],
                `${match[1]}${generated}\n\n${AUTO_MARKER}\n\n`,
              );
            } else {
              updated = `# Description\n\n${generated}\n\n${AUTO_MARKER}\n\n${updated}`;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: PULL_NUMBER,
              body: updated,
            });
            console.log(`Updated description for PR #${PULL_NUMBER}.`);

  update-status:
    name: Update CI Status
    if: github.event_name == 'check_run'
    runs-on: ubuntu-latest
    steps:
      - name: Update PR description checkboxes
        uses: actions/github-script@v7
        with:
          script: |
            const maintainedMarker = '<!-- maintained-by-copilot -->';

            // Resolve the head SHA from the triggering event
            const headSha = context.payload.check_run.head_sha;

            if (!headSha) {
              console.log('Could not determine head SHA, skipping.');
              return;
            }

            // Find open draft PRs with this head SHA that have the maintained marker
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const targetPrs = prs.filter(
              (pr) =>
                pr.draft &&
                pr.head.sha === headSha &&
                pr.body &&
                pr.body.includes(maintainedMarker),
            );

            if (targetPrs.length === 0) {
              console.log('No matching draft PRs with maintained description found, skipping.');
              return;
            }

            // Fetch all check runs for this commit
            const { data: checkData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            const checkRuns = checkData.check_runs;

            /**
             * Returns 'success' if all completed check runs whose names match the
             * pattern succeeded, 'failure' if any failed, or null if none match.
             */
            const getCheckStatus = (pattern) => {
              const re = new RegExp(pattern, 'i');
              const matching = checkRuns.filter(
                (cr) => re.test(cr.name) && cr.status === 'completed',
              );
              if (matching.length === 0) return null;
              const failed = matching.filter(
                (cr) =>
                  cr.conclusion === 'failure' ||
                  cr.conclusion === 'timed_out' ||
                  cr.conclusion === 'action_required',
              );
              return failed.length === 0 ? 'success' : 'failure';
            };

            // Maps check-run name patterns to the actual checkbox text in
            // .github/PULL_REQUEST_TEMPLATE.md that they should auto-manage.
            const ciCheckboxMappings = [
              {
                // Matches any test check run (unit tests, integration tests, etc.)
                pattern: '\\btest(s|ing)?\\b',
                checkboxes: [
                  {
                    unchecked: '- [ ] All unit tests pass.',
                    checked: '- [x] All unit tests pass.',
                  },
                  {
                    unchecked: '- [ ] All integration tests pass.',
                    checked: '- [x] All integration tests pass.',
                  },
                  {
                    unchecked: '- [ ] All new and existing tests passed.',
                    checked: '- [x] All new and existing tests passed.',
                  },
                ],
              },
              {
                // Matches code quality / static analysis / lint check runs
                pattern: '\\b(quality|lint|analysis|format|prettier)\\b',
                checkboxes: [
                  {
                    unchecked:
                      '- [ ] There are no Resharper\\static code analysis errors anywhere in the solution.',
                    checked:
                      '- [x] There are no Resharper\\static code analysis errors anywhere in the solution.',
                  },
                ],
              },
            ];

            for (const pr of targetPrs) {
              let body = pr.body;
              let updated = false;

              for (const { pattern, checkboxes } of ciCheckboxMappings) {
                const status = getCheckStatus(pattern);
                for (const { unchecked, checked } of checkboxes) {
                  if (status === 'success' && body.includes(unchecked)) {
                    body = body.replaceAll(unchecked, checked);
                    updated = true;
                  } else if (status === 'failure' && body.includes(checked)) {
                    body = body.replaceAll(checked, unchecked);
                    updated = true;
                  }
                }
              }

              if (updated) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  body,
                });
                console.log(`Updated checkboxes for PR #${pr.number}.`);
              } else {
                console.log(`No checkbox update needed for PR #${pr.number}.`);
              }
            }

  update-change-types:
    name: Update Change Type Checkboxes
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'reopened' ||
       github.event.action == 'converted_to_draft' ||
       github.event.action == 'edited')
    runs-on: ubuntu-latest
    steps:
      - name: Update change type checkboxes based on PR files
        uses: actions/github-script@v7
        with:
          script: |
            const maintainedMarker = '<!-- maintained-by-copilot -->';
            const pr = context.payload.pull_request;

            // Fetch the current PR body to avoid relying on stale event payload
            const { data: currentPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const body = currentPr.body ?? '';

            if (!body.includes(maintainedMarker)) {
              console.log('PR description is not maintained by Copilot, skipping.');
              return;
            }

            // Get the list of changed files (handle pagination)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const filenames = files.map((f) => f.filename);

            // Detect change types from file paths
            const isChangelogFile = (f) =>
              f.toLowerCase() === 'changelog.md' || f.toLowerCase().endsWith('/changelog.md');

            const isDocFile = (f) =>
              /^docs\//i.test(f) ||
              (/\.md$/i.test(f) && !isChangelogFile(f));

            const isDependencyFile = (f) =>
              /(^|\/)package\.json$/i.test(f) ||
              /(^|\/)package-lock\.json$/i.test(f) ||
              /(^|\/)yarn\.lock$/i.test(f) ||
              /(^|\/)pnpm-lock\.yaml$/i.test(f) ||
              /(^|\/)requirements.*\.txt$/i.test(f) ||
              /(^|\/)Pipfile\.lock$/i.test(f) ||
              /(^|\/)pyproject\.toml$/i.test(f) ||
              /\.csproj$/i.test(f) ||
              /(^|\/)Directory\.Packages\.props$/i.test(f) ||
              /(^|\/)nuget\.config$/i.test(f);

            const isTestFile = (f) =>
              /\.(test|spec)\.[cm]?[jt]sx?$/i.test(f) ||
              /Tests?\.[a-z]+$/i.test(f);

            const hasDocChange = filenames.some(isDocFile);
            const hasDependencyUpgrade = filenames.some(isDependencyFile);
            const hasTestChange = filenames.some(isTestFile);
            const hasChangelogUpdate = filenames.some(isChangelogFile);

            // Each entry: condition drives checked (true) or unchecked (false)
            const checkboxUpdates = [
              {
                condition: hasDocChange,
                unchecked: '- [ ] Docs change',
                checked: '- [x] Docs change',
              },
              {
                condition: hasDependencyUpgrade,
                unchecked: '- [ ] Dependency upgrade',
                checked: '- [x] Dependency upgrade',
              },
              {
                condition: hasTestChange,
                unchecked: '- [ ] Additional Unit Tests\\Integration Tests',
                checked: '- [x] Additional Unit Tests\\Integration Tests',
              },
              {
                condition: hasChangelogUpdate,
                unchecked:
                  '- [ ] Unreleased section of CHANGELOG.md has been updated with details of this PR.',
                checked:
                  '- [x] Unreleased section of CHANGELOG.md has been updated with details of this PR.',
              },
              {
                condition: hasTestChange,
                unchecked: '- [ ] I have added tests to cover my changes.',
                checked: '- [x] I have added tests to cover my changes.',
              },
            ];

            let updatedBody = body;
            let updated = false;

            for (const { condition, unchecked, checked } of checkboxUpdates) {
              if (condition && updatedBody.includes(unchecked)) {
                updatedBody = updatedBody.replaceAll(unchecked, checked);
                updated = true;
              } else if (!condition && updatedBody.includes(checked)) {
                updatedBody = updatedBody.replaceAll(checked, unchecked);
                updated = true;
              }
            }

            if (updated) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: updatedBody,
              });
              console.log(`Updated change type checkboxes for PR #${pr.number}.`);
            } else {
              console.log(`No change type checkbox update needed for PR #${pr.number}.`);
            }
