name: "Dependabot: Approve updates"
on:
  # https://securitylab.github.com/research/github-actions-preventing-pwn-requests
  # could and should work, at least for public repos;
  # tracking issue for this action's issue:
  # https://github.com/ahmadnassri/action-dependabot-auto-merge/issues/60
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main

permissions:
  contents: read


jobs:
  requirements:
    if: vars.DEPENDABOT_AUTOMERGE == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "Check Required Secrets"
        shell: bash
        run: |
          if [ -z "${{secrets.SOURCE_PUSH_TOKEN}}" ]; then
            echo "::error::SOURCE_PUSH_TOKEN is required but not set"
            exit 1
          fi

  enable-auto-merge-github-actions:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      startsWith(github.head_ref, 'dependabot/github_actions/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write


    # Specifically check that dependabot (or another trusted party) created this pull-request, and that it has been labelled correctly.

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Check Repo Owner"
        uses: actions/github-script@v9.0.0
        with:
          script: |
            core.info(`Owner: ${context.repo.owner}`);

      - name: "Auto Merge"
        uses: ./.github/actions/enable-automerge
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          merge-method: "MERGE"

  enable-auto-merge-npm:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      startsWith(github.head_ref, 'dependabot/npm_and_yarn/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    # Specifically check that dependabot (or another trusted party) created this pull-request, and that it has been labelled correctly.

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Check Repo Owner"
        uses: actions/github-script@v9.0.0
        with:
          script: |
            core.info(`Owner: ${context.repo.owner}`);

      - name: "Auto Merge"
        uses: ./.github/actions/enable-automerge
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          merge-method: "MERGE"

  auto-approve-dependabot-gitub-actions:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      startsWith(github.head_ref, 'dependabot/github_actions/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Check Repo Owner"
        uses: actions/github-script@v9.0.0
        with:
          script: |
            core.info(`Owner: ${context.repo.owner}`);

      - name: "Approve"
        uses: ./.github/actions/approve-pr
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}

  auto-approve-dependabot-npm:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      startsWith(github.head_ref, 'dependabot/npm_and_yarn/')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Check Repo Owner"
        uses: actions/github-script@v9.0.0
        with:
          script: |
            core.info(`Owner: ${context.repo.owner}`);

      - name: "Approve"
        uses: ./.github/actions/approve-pr
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}