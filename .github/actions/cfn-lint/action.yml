--- # Action: Run Cloud Formation Linter
name: "Run Cloud Formation Linter"
description: "Installs cfn-lint via pip and lints a CloudFormation template"

inputs:
  template:
    description: "Path to the CloudFormation template file to lint"
    required: true

runs:
  using: composite
  steps:
    - name: "Setup Python"
      uses: actions/setup-python@v6.3.0
      with:
        python-version: "3.13"

    - name: "Set cfn-lint venv path"
      shell: bash
      run: |
        VENV_BASE="$GITHUB_WORKSPACE/.cfn-lint"
        VENV_RUN="${{github.sha}}-${{github.run_id}}-${{github.run_number}}-${{github.run_attempt}}"
        echo "CFN_LINT_VENV=$VENV_BASE/$VENV_RUN" >> "$GITHUB_ENV"

    - name: "Create cfn-lint virtual environment"
      shell: bash
      run: |
        mkdir -p "$(dirname "$CFN_LINT_VENV")"
        python -m venv "$CFN_LINT_VENV"
        echo "cfn-lint" > "$GITHUB_ACTION_PATH/requirements.txt"
        "$CFN_LINT_VENV/bin/pip" install --quiet -r "$GITHUB_ACTION_PATH/requirements.txt"

    - name: "Run Cloud Formation Linter"
      shell: bash
      run: |
        "$CFN_LINT_VENV/bin/cfn-lint" --info --include-checks I --template "$TEMPLATE"
      env:
        TEMPLATE: ${{inputs.template}}

    - name: "Cleanup cfn-lint virtual environment"
      if: always()
      shell: bash
      run: |
        [[ -n "$CFN_LINT_VENV" ]] && rm -rf "$CFN_LINT_VENV" || true
