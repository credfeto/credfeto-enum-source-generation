--- # Assign the pull request to its creator
name: "Assign PR to Creator"
description: "Assigns the pull request to the user who created it"

inputs:
  github-token:
    description: "GitHub token with pull-requests write permission"
    required: true

runs:
  using: composite
  steps:
    - name: "Assign PR to Creator"
      uses: actions/github-script@v9.0.0
      with:
        github-token: ${{inputs.github-token}}
        script: |
          const creator = context.payload.pull_request.user.login;
          await octokit.rest.issues.addAssignees({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            assignees: [creator],
          });
          core.info(`✅ Assigned PR #${context.payload.pull_request.number} to ${creator}`);
          core.notice(`Assigned PR #${context.payload.pull_request.number} to ${creator}`);
