--- # Approve the current pull request
# Maintain in repo: funfair-server-template
name: "Approve PR"
description: "Approves the current pull request"

inputs:
  github-token:
    description: "GitHub token with pull-requests write permission"
    required: true

runs:
  using: composite
  steps:
    - name: "Approve PR"
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{inputs.github-token}}
        script: |
          await github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
            event: 'APPROVE',
          });
          core.info(`✅ Approved PR #${context.payload.pull_request.number}`);
          core.notice(`Approved PR #${context.payload.pull_request.number}`);
