--- # Publishes a Dotnet app to an executable
# Maintain in repo: funfair-server-template
name: 'Publishes a Dotnet app to an executable'
description: 'Publishes a Dotnet app to an executable'
inputs:
  # General
  PRODUCTION_BUILD:
    description: 'Whether to build a production build'
    required: true

  BUILD_VERSION:
    description: 'Build version'
    required: true

  RELEASE_NOTES:
    description: 'Release notes'
    required: false

  PLATFORM:
    description: 'Platform to build'
    required: true

  PROJECT_TO_PUBLISH:
    description: 'Package (root) to deploy'
    required: false

runs:
  using: "composite"
  steps:
    - name: "Dotnet: Check Variables"
      shell: bash
      run: |
        echo "Platform: $PLATFORM"
        if [ -z "$PLATFORM" ]; then
          echo "Missing Platform";
          exit 1
        fi
      env:
        PLATFORM: ${{inputs.PLATFORM}}

    # PublishTrimmed and PublishAot are controlled per-project in .csproj files so each project can opt in independently.
    ## Notes: NETSDK1094  can't use --no-restore
    - name: "Dotnet: Publish"
      working-directory: ${{github.workspace}}/src/${{inputs.PROJECT_TO_PUBLISH}}
      shell: bash
      run: |
        dotnet publish \
                  --warnaserror  \
                  --configuration:Release \
                  "-r:${{inputs.PLATFORM}}" \
                  --self-contained \
                  --ignore-failed-sources \
                  -nodeReuse:False \
                  "-p:Deterministic=True" \
                  "-p:DisableSwagger=${{env.RELEASE}}" \
                  "-p:FFPublishing=True" \
                  "-p:IncludeNativeLibrariesForSelfExtract=True" \
                  "-p:IsProduction=${{inputs.PRODUCTION_BUILD}}" \
                  "-p:NoWarn=NETSDK1179" \
                  "-p:Optimize=true" \
                  "-p:PublishReadyToRun=false" \
                  "-p:PublishReadyToRunShowWarnings=True" \
                  "-p:PublishSingleFile=true" \
                  "-p:SolutionDir=..\\" \
                  "-p:SuppressNETCoreSdkPreviewMessage=true" \
                  "-p:TreatWarningsAsErrors=True" \
                  "-p:Version=${{inputs.BUILD_VERSION}}" \
                  "-p:ContinuousIntegrationBuild=true" \
                  --output ${{github.workspace}}/server-dist/${{inputs.PLATFORM}} \
                  ${{env.DOTNET_RELEASE_DEFINES}}
      env:
        ReleaseNotes: ${{inputs.RELEASE_NOTES}}

    - name: "Report publish output size"
      uses: actions/github-script@v9.0.0
      env:
        OUTPUT_DIR: "${{github.workspace}}/server-dist/${{inputs.PLATFORM}}"
        PLATFORM: "${{inputs.PLATFORM}}"
      with:
        script: |
          const { execSync } = require('child_process');
          const outputDir = process.env.OUTPUT_DIR;
          const platform = process.env.PLATFORM;
          let sizes = '';
          try {
            sizes = execSync(`du -sh "${outputDir}"/*`, { encoding: 'utf8', shell: true }).trim();
          } catch {
            // no output files found
          }
          if (sizes) {
            const message = `Published output sizes for ${platform}:\n${sizes}`;
            core.info(`\u001b[36m${message}\u001b[0m`);
            core.notice(message, { title: `Publish output size: ${platform}` });
          } else {
            core.info(`No output files found for ${platform}`);
          }
