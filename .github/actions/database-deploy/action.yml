--- # Build and deploy packages
name: 'Build and deploy'
description: 'Builds and deploys the source'
inputs:
  BUILD_VERSION:
    description: "Build Version"
    required: true
  SQL_SERVER:
    description: 'SQL Server to connect to'
    required: true
  SQL_DB:
    description: 'Database to deploy to'
    required: true
  SQL_USER:
    description: 'User to connect to the database as'
    required: true
  SQL_PASSWORD:
    description: 'Password for SQL_USER'
    required: true
  DB_FOLDER:
    description: 'Folder where SQL Files live'
    required: true

runs:
  using: "composite"
  steps:

    - name: "Dotnet: Find Dacpac"
      id: find_solution
      working-directory: ${{github.workspace}}/src
      shell: bash
      run: |
        echo "Looking for dacpac"
        DACPAC="$(find . -type f -iname "*.dacpac" | head -1)"
        echo "Found: $DACPAC"
        echo "DACPAC=$DACPAC" >> "$GITHUB_OUTPUT"

    - name: "Install SQLPackage tool"
      uses: ./.github/actions/dotnet-tool
      with:
        TOOL_NAME: "microsoft.sqlpackage"
        TOOL_VERSION: "latest"

    - name: "Dotnet: Deploy/Live Server"
      uses: ./.github/actions/dotnet-tool-run
      with:
        WORKING_DIRECTORY: "${{github.workspace}}/src"
        TOOL_NAME: "sqlpackage"
        TOOL_ARGUMENTS: "/Action:publish \
            /sf:\"${{steps.find_solution.outputs.DACPAC}}\" \
            /tsn:\"${{inputs.SQL_SERVER}}\" \
            /tdn:\"${{inputs.SQL_DB}}\" \
            /tu:\"${{inputs.SQL_USER}}\" \
            /tp:\"${{inputs.SQL_PASSWORD}}\" \
            /tec:false \
            /d:true \
            /TargetTimeout:720 \
            /p:CommandTimeout=720 \
            /p:BackupDatabaseBeforeChanges=False \
            /p:BlockOnPossibleDataLoss=True \
            /p:DropObjectsNotInSource=True \
            \"/p:DoNotDropObjectTypes=Aggregates;ApplicationRoles;Assemblies;AssemblyFiles;AsymmetricKeys;BrokerPriorities;Certificates;ColumnEncryptionKeys;ColumnMasterKeys;Contracts;DatabaseOptions;DatabaseRoles;Filegroups;Files;FileTables;RoleMembership;Rules;Users;Credentials;CryptographicProviders;DatabaseAuditSpecifications;DatabaseEncryptionKeys;DatabaseScopedCredentials;Endpoints;LinkedServerLogins;LinkedServers;Logins;MasterKeys;Routes;ServerAuditSpecifications;ServerRoleMembership;ServerRoles;ServerTriggers\" \
            /p:IncludeCompositeObjects=True"

